<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Earning BD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 25px;
        }

        .logo-icon {
            font-size: 50px;
            color: #38bdf8;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.5));
            animation: pulse 2s infinite;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.5px;
        }

        .header p {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 5px;
        }

        .balance-card {
            background: linear-gradient(135deg, #38bdf8 0%, #0284c7 100%);
            width: 100%;
            max-width: 350px;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(2, 132, 199, 0.3);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .balance-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: rgba(255, 255, 255, 0.1);
            transform: rotate(45deg);
            pointer-events: none;
        }

        .balance-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #e0f2fe;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 32px;
            font-weight: 800;
            color: #ffffff;
        }

        /* Channel Invite Banner */
        .join-banner {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(56, 189, 248, 0.2);
            width: 100%;
            max-width: 350px;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            backdrop-filter: blur(10px);
        }

        .join-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .join-info i {
            font-size: 24px;
            color: #24a1de;
        }

        .join-text h3 {
            font-size: 14px;
            font-weight: 600;
        }

        .join-text p {
            font-size: 11px;
            color: #94a3b8;
        }

        .join-btn {
            background: #24a1de;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            box-shadow: 0 4px 10px rgba(36, 161, 222, 0.3);
            transition: all 0.2s ease;
        }

        .join-btn:active {
            transform: scale(0.95);
        }

        /* Section Title */
        .section-title {
            width: 100%;
            max-width: 350px;
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        /* Menu Grid (Ads Options Included) */
        .menu-grid {
            width: 100%;
            max-width: 350px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .menu-item {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }

        .menu-item:active {
            transform: scale(0.95);
            background: rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .menu-item i {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .menu-item span {
            font-size: 14px;
            font-weight: 500;
            color: #e2e8f0;
        }

        /* Beautiful Colors for Tasks/Ads and others */
        .col-ads1 { color: #f59e0b; } /* Orange */
        .col-ads2 { color: #f43f5e; } /* Pink-Red */
        .col-wallet { color: #10b981; } /* Green */
        .col-ref { color: #a855f7; } /* Purple */

        .footer-text {
            font-size: 11px;
            color: #64748b;
            margin-top: auto;
            text-align: center;
            padding-top: 20px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-icon"><i class="fas fa-coins"></i></div>
        <h1>Easy Earning BD</h1>
        <p>Trustworthy Earning Platform</p>
    </div>

    <div class="balance-card">
        <div class="balance-label">Your Balance</div>
        <div class="balance-amount">৳ 0.00</div>
    </div>

    <!-- Official Channel Banner (Direct Invite Link) -->
    <div class="join-banner">
        <div class="join-info">
            <i class="fab fa-telegram"></i>
            <div class="join-text">
                <h3>Our Channel</h3>
                <p>Join for payment proofs</p>
            </div>
        </div>
        <!-- আপনার ইনভাইট লিংকটি এখানে সেট করা হয়েছে -->
        <a href="https://t.me/+WTcMr-uFw3s1MDVl" target="_blank" class="join-btn">Join Now</a>
    </div>

    <!-- Earning Options Section -->
    <div class="section-title">Earn Money</div>
    <div class="menu-grid">
        <div class="menu-item" onclick="alert('Loading Ad 1... (Connect your Ad network code here)')">
            <i class="fas fa-play-circle col-ads1"></i>
            <span>Watch Ads 1</span>
        </div>
        
        <div class="menu-item" onclick="alert('Loading Ad 2... (Connect your Ad network code here)')">
            <i class="fas fa-video col-ads2"></i>
            <span>Watch Ads 2</span>
        </div>
    </div>

    <!-- User Options Section -->
    <div class="section-title">Menu</div>
    <div class="menu-grid">
        <div class="menu-item" onclick="alert('Withdraw system coming soon!')">
            <i class="fas fa-wallet col-wallet"></i>
            <span>Withdraw</span>
        </div>
        
        <div class="menu-item" onclick="alert('Referral system coming soon!')">
            <i class="fas fa-users col-ref"></i>
            <span>Refer & Earn</span>
        </div>
    </div>

    <p class="footer-text">© 2026 Easy Earning BD. All Rights Reserved.</p>

</body>
</html>
